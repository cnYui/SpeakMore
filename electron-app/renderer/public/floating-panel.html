<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%;
  height: 100%;
  background: transparent;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}
#panel {
  width: 100%;
  height: 100%;
  padding: 16px 18px 15px;
  border-radius: 18px;
  border: 0.5px solid rgba(119,119,119,0.14);
  background: rgba(255,255,255,0.96);
  box-shadow: 0 10px 22px rgba(17,17,17,0.15), 0 2px 6px rgba(17,17,17,0.08);
  color: #2f3135;
}
.panel-row {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  width: 100%;
  height: 100%;
}
.hint-title {
  font-size: 16px;
  line-height: 1.25;
  font-weight: 500;
  letter-spacing: 0;
}
.hint-text {
  margin-top: 8px;
  max-width: 352px;
  font-size: 13px;
  line-height: 1.55;
  color: #656a72;
}
.chips {
  display: flex;
  gap: 8px;
  row-gap: 8px;
  flex-wrap: wrap;
  margin-top: 12px;
}
.chip {
  display: inline-flex;
  align-items: center;
  height: 32px;
  padding: 0 12px;
  border-radius: 8px;
  border: 1px solid rgba(119,119,119,0.16);
  background: rgba(255,255,255,0.95);
  color: #3f4349;
  font-size: 13px;
  line-height: 1;
}
.dismiss {
  flex-shrink: 0;
  width: 26px;
  height: 26px;
  border: 0;
  border-radius: 999px;
  background: transparent;
  color: #8b8f96;
  font-size: 20px;
  line-height: 1;
  cursor: pointer;
}
.dismiss:hover {
  background: rgba(119,119,119,0.08);
  color: #555b61;
}
.result-actions {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  gap: 4px;
}
.icon-button {
  width: 26px;
  height: 26px;
  border: 0;
  border-radius: 999px;
  background: transparent;
  color: #8b8f96;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}
.icon-button:hover:not(:disabled) {
  background: rgba(119,119,119,0.08);
  color: #555b61;
}
.icon-button:disabled {
  cursor: default;
  color: rgba(139,143,150,0.42);
}
.copy-icon {
  position: relative;
  display: inline-block;
  width: 16px;
  height: 16px;
}
.copy-icon::before,
.copy-icon::after {
  content: "";
  position: absolute;
  width: 9px;
  height: 11px;
  border: 1.6px solid currentColor;
  border-radius: 1.5px;
  background: transparent;
}
.copy-icon::before {
  left: 3px;
  top: 3px;
}
.copy-icon::after {
  left: 6px;
  top: 0;
  background: rgba(255,255,255,0.96);
}
.result-text {
  flex: 1;
  max-height: 100%;
  overflow: auto;
  white-space: pre-wrap;
  word-break: break-word;
  font-size: 14px;
  line-height: 1.55;
  color: #2f3135;
  padding-right: 2px;
}
.hidden {
  display: none;
}
</style>
</head>
<body>
<div id="panel">
  <div id="shortcut-view" class="panel-row">
    <div>
      <div class="hint-title">检测到长按快捷键</div>
      <div class="hint-text">长按 Right Alt 不会开始语音输入。请短按 Right Alt，或使用 Right Alt + Space / Right Alt + Right Shift。</div>
      <div class="chips">
        <span class="chip">Right Alt</span>
        <span class="chip">Right Alt + Space</span>
        <span class="chip">Right Alt + Right Shift</span>
      </div>
    </div>
    <button class="dismiss" type="button" aria-label="关闭提示">×</button>
  </div>

  <div id="result-view" class="panel-row hidden">
    <div id="result-text" class="result-text"></div>
    <div class="result-actions">
      <button id="copy-result" class="icon-button" type="button" aria-label="复制结果" title="复制结果" disabled>
        <span class="copy-icon" aria-hidden="true"></span>
      </button>
      <button class="dismiss" type="button" aria-label="关闭结果">×</button>
    </div>
  </div>
</div>
<script>
const shortcutView = document.getElementById('shortcut-view');
const resultView = document.getElementById('result-view');
const resultText = document.getElementById('result-text');
const copyResultButton = document.getElementById('copy-result');
let currentResultText = '';

function closeFloatingPanel() {
  if (window.ipcRenderer) {
    window.ipcRenderer.send('floating-panel', { visible: false });
  }
}

function renderFloatingPanel(payload) {
  const panelType = payload && payload.type === 'free-ask-result' ? 'free-ask-result' : 'shortcut-hint';

  if (panelType === 'free-ask-result') {
    currentResultText = typeof payload.text === 'string' ? payload.text : '';
    shortcutView.classList.add('hidden');
    resultView.classList.remove('hidden');
    resultText.textContent = currentResultText;
    copyResultButton.disabled = !currentResultText;
    return;
  }

  currentResultText = '';
  resultView.classList.add('hidden');
  shortcutView.classList.remove('hidden');
  resultText.textContent = '';
  copyResultButton.disabled = true;
}

function writeClipboardText(text) {
  if (!text) return Promise.resolve();
  if (window.ipcRenderer && typeof window.ipcRenderer.invoke === 'function') {
    return window.ipcRenderer.invoke('clipboard:write-text', text)
      .catch(() => navigator.clipboard && navigator.clipboard.writeText(text));
  }
  if (navigator.clipboard) return navigator.clipboard.writeText(text);
  return Promise.resolve();
}

Array.from(document.querySelectorAll('.dismiss')).forEach((button) => {
  button.addEventListener('click', closeFloatingPanel);
});

copyResultButton.addEventListener('click', () => {
  writeClipboardText(currentResultText);
});

if (window.ipcRenderer) {
  window.ipcRenderer.on('floating-panel', (_event, payload) => renderFloatingPanel(payload));
}

renderFloatingPanel({ visible: true, type: 'shortcut-hint' });
</script>
</body>
</html>
