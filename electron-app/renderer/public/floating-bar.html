<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%;
  height: 100%;
  background: transparent;
  overflow: hidden;
  pointer-events: none;
}
#scene {
  position: relative;
  width: 100%;
  height: 100%;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}
#bar,
#hint {
  pointer-events: auto;
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
}
#bar {
  display: inline-flex;
  align-items: center;
  gap: 9.3px;
  height: 44.6px;
  min-width: 230px;
  padding: 0 18.6px;
  border-radius: 9999px;
  background: rgba(255,255,255,0.94);
  backdrop-filter: blur(9px);
  border: 0.5px solid rgba(119,119,119,0.14);
  box-shadow: 0 8px 18px rgba(17,17,17,0.16), 0 2px 6px rgba(17,17,17,0.08);
  font-size: 13px;
  color: #333;
}
#dot {
  width: 9.3px;
  height: 9.3px;
  border-radius: 50%;
  background: #999;
  flex-shrink: 0;
}
#dot.active { background: #44bedf; }
#levels {
  display: flex;
  align-items: center;
  gap: 3.7px;
  height: 22.3px;
}
.lv {
  width: 3.7px;
  height: 9.3px;
  border-radius: 999px;
  background: #d0d4d8;
  transition: height 70ms linear, background-color 120ms ease;
}
.lv.active {
  background: #44bedf;
}
#hint {
  display: none;
  top: calc(50% - 24px);
  width: min(360px, calc(100% - 20px));
  padding: 14px 16px 13px;
  border-radius: 18px;
  border: 0.5px solid rgba(119,119,119,0.14);
  background: rgba(255,255,255,0.96);
  box-shadow: 0 10px 22px rgba(17,17,17,0.15), 0 2px 6px rgba(17,17,17,0.08);
  color: #2f3135;
}
.hint-row {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
}
.hint-title {
  font-size: 16px;
  line-height: 1.25;
  font-weight: 500;
  letter-spacing: 0;
}
.hint-text {
  margin-top: 8px;
  font-size: 13px;
  line-height: 1.55;
  color: #656a72;
}
.chips {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 12px;
}
.chip {
  display: inline-flex;
  align-items: center;
  height: 32px;
  padding: 0 12px;
  border-radius: 8px;
  border: 1px solid rgba(119,119,119,0.16);
  background: rgba(255,255,255,0.95);
  color: #3f4349;
  font-size: 13px;
  line-height: 1;
}
.dismiss {
  flex-shrink: 0;
  width: 26px;
  height: 26px;
  border: 0;
  border-radius: 999px;
  background: transparent;
  color: #8b8f96;
  font-size: 20px;
  line-height: 1;
  cursor: pointer;
}
.dismiss:hover {
  background: rgba(119,119,119,0.08);
  color: #555b61;
}
</style>
</head>
<body>
<div id="scene">
  <div id="bar">
    <div id="dot"></div>
    <span id="text">Right Alt 录音</span>
    <div id="levels"></div>
  </div>
  <div id="hint">
    <div class="hint-row">
      <div>
        <div class="hint-title">检测到长按快捷键</div>
        <div class="hint-text">长按 Right Alt 不会开始语音输入。请短按 Right Alt，或使用 Right Alt + Space / Right Alt + Right Shift。</div>
        <div class="chips">
          <span class="chip">Right Alt</span>
          <span class="chip">Right Alt + Space</span>
          <span class="chip">Right Alt + Right Shift</span>
        </div>
      </div>
      <button id="dismiss" class="dismiss" type="button" aria-label="关闭提示">×</button>
    </div>
  </div>
</div>
<script>
const BAR_COUNT = 8;
const BAR_WEIGHTS = [0.72, 0.84, 0.94, 1, 1, 0.94, 0.84, 0.72];
const MIN_BAR_HEIGHT = 9.3;
const MAX_BAR_HEIGHT = 33.4;
const dot = document.getElementById('dot');
const text = document.getElementById('text');
const levelsContainer = document.getElementById('levels');
const capsule = document.getElementById('bar');
const hintCard = document.getElementById('hint');
const dismissButton = document.getElementById('dismiss');

levelsContainer.innerHTML = Array.from({ length: BAR_COUNT }, () => '<div class="lv"></div>').join('');
const levels = Array.from(document.querySelectorAll('.lv'));

let voiceState = null;
let shortcutHintVisible = false;

function clampLevel(value) {
  if (typeof value !== 'number' || Number.isNaN(value)) return 0;
  return Math.max(0, Math.min(1, value));
}

function renderLevels(inputLevel, active) {
  const normalizedLevel = active ? clampLevel(inputLevel) : 0;
  levels.forEach((element, index) => {
    const weightedLevel = normalizedLevel * BAR_WEIGHTS[index];
    const height = MIN_BAR_HEIGHT + ((MAX_BAR_HEIGHT - MIN_BAR_HEIGHT) * weightedLevel);
    element.style.height = `${Math.round(height)}px`;
    element.className = active ? 'lv active' : 'lv';
  });
}

function renderCapsule(state) {
  const status = state && typeof state.status === 'string' ? state.status : 'idle';
  const displayText = state && typeof state.displayText === 'string' ? state.displayText : '';
  const errorMessage = state && typeof state.errorMessage === 'string' ? state.errorMessage : '';
  const stateLevel = state && typeof state.inputLevel === 'number' ? state.inputLevel : 0;

  dot.className = status === 'recording' ? 'active' : '';
  renderLevels(stateLevel, status === 'recording');

  if (status === 'recording') {
    text.textContent = '正在监听...';
    return;
  }

  if (displayText) {
    text.textContent = displayText;
    return;
  }

  if (status === 'connecting') text.textContent = '正在连接...';
  else if (status === 'stopping') text.textContent = '正在停止...';
  else if (status === 'transcribing') text.textContent = '正在转写...';
  else if (status === 'cancelled') text.textContent = '当前转录已取消';
  else if (status === 'completed') text.textContent = '已完成';
  else if (status === 'error') text.textContent = errorMessage || '发生错误';
  else text.textContent = 'Right Alt 录音';
}

function render() {
  hintCard.style.display = shortcutHintVisible ? 'block' : 'none';
  capsule.style.display = shortcutHintVisible ? 'none' : 'inline-flex';
  if (!shortcutHintVisible) renderCapsule(voiceState);
}

function applyVoiceState(state) {
  voiceState = state;
  render();
}

function applyShortcutHint(payload) {
  shortcutHintVisible = Boolean(payload && payload.visible);
  render();
}

dismissButton.addEventListener('click', () => {
  shortcutHintVisible = false;
  render();
  if (window.ipcRenderer) {
    window.ipcRenderer.send('shortcut-hint', { visible: false });
  }
});

if (window.ipcRenderer) {
  window.ipcRenderer.on('voice-state', (_event, state) => applyVoiceState(state));
  window.ipcRenderer.on('shortcut-hint', (_event, payload) => applyShortcutHint(payload));
}

render();
</script>
</body>
</html>
