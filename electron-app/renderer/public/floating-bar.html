<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { background: transparent; overflow: hidden; pointer-events: none; }
#bar {
  pointer-events: auto;
  display: inline-flex;
  align-items: center;
  gap: 10px;
  height: 48px;
  min-width: 248px;
  padding: 0 20px;
  border-radius: 9999px;
  background: rgba(255,255,255,0.94);
  backdrop-filter: blur(18px);
  border: 1px solid rgba(119,119,119,0.14);
  box-shadow: 0 16px 36px rgba(17,17,17,0.16), 0 4px 12px rgba(17,17,17,0.08);
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  font-size: 14px;
  color: #333;
}
#dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: #999;
  flex-shrink: 0;
}
#dot.active { background: #44bedf; }
#levels {
  display: flex;
  align-items: center;
  gap: 3px;
  height: 24px;
}
.lv {
  width: 3px; height: 6px;
  border-radius: 2px;
  background: #ccc;
}
.lv.active {
  background: #44bedf;
  animation: level 0.6s ease-in-out infinite;
}
.lv:nth-child(2).active { animation-delay: 0.08s; }
.lv:nth-child(3).active { animation-delay: 0.16s; }
.lv:nth-child(4).active { animation-delay: 0.24s; }
.lv:nth-child(5).active { animation-delay: 0.32s; }
@keyframes level {
  0%, 100% { height: 6px; }
  50% { height: 18px; }
}
</style>
</head>
<body>
<div id="bar">
  <div id="dot"></div>
  <span id="text">Right Alt 录音</span>
  <div id="levels">
    <div class="lv"></div><div class="lv"></div><div class="lv"></div><div class="lv"></div><div class="lv"></div>
  </div>
</div>
<script>
const dot = document.getElementById('dot');
const text = document.getElementById('text');
const levels = Array.from(document.querySelectorAll('.lv'));

function setActive(active) {
  dot.className = active ? 'active' : '';
  levels.forEach((element) => {
    element.className = active ? 'lv active' : 'lv';
  });
}

function applyVoiceState(state) {
  const status = state && typeof state.status === 'string' ? state.status : 'idle';
  const errorMessage = state && typeof state.errorMessage === 'string' ? state.errorMessage : '';

  if (status === 'recording') {
    setActive(true);
    text.textContent = '正在监听...';
    return;
  }

  setActive(false);

  if (status === 'connecting') text.textContent = '正在连接...';
  else if (status === 'stopping') text.textContent = '正在停止...';
  else if (status === 'transcribing') text.textContent = '正在转写...';
  else if (status === 'completed') text.textContent = '已完成';
  else if (status === 'error') text.textContent = errorMessage || '发生错误';
  else text.textContent = 'Right Alt 录音';
}

if (window.ipcRenderer) {
  window.ipcRenderer.on('voice-state', (_event, state) => applyVoiceState(state));
}
</script>
</body>
</html>
