<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { background: transparent; overflow: hidden; pointer-events: none; }
#bar {
  pointer-events: auto;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  height: 24px;
  min-width: 124px;
  padding: 0 10px;
  border-radius: 9999px;
  background: rgba(255,255,255,0.94);
  backdrop-filter: blur(9px);
  border: 0.5px solid rgba(119,119,119,0.14);
  box-shadow: 0 8px 18px rgba(17,17,17,0.16), 0 2px 6px rgba(17,17,17,0.08);
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  font-size: 7px;
  color: #333;
}
#dot {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: #999;
  flex-shrink: 0;
}
#dot.active { background: #44bedf; }
#levels {
  display: flex;
  align-items: center;
  gap: 2px;
  height: 12px;
}
.lv {
  width: 2px;
  height: 5px;
  border-radius: 999px;
  background: #d0d4d8;
  transition: height 70ms linear, background-color 120ms ease;
}
.lv.active {
  background: #44bedf;
}
</style>
</head>
<body>
<div id="bar">
  <div id="dot"></div>
  <span id="text">Right Alt 录音</span>
  <div id="levels"></div>
</div>
<script>
const BAR_COUNT = 8;
const BAR_WEIGHTS = [0.72, 0.84, 0.94, 1, 1, 0.94, 0.84, 0.72];
const MIN_BAR_HEIGHT = 5;
const MAX_BAR_HEIGHT = 18;
const dot = document.getElementById('dot');
const text = document.getElementById('text');
const levelsContainer = document.getElementById('levels');

levelsContainer.innerHTML = Array.from({ length: BAR_COUNT }, () => '<div class="lv"></div>').join('');
const levels = Array.from(document.querySelectorAll('.lv'));

function clampLevel(value) {
  if (typeof value !== 'number' || Number.isNaN(value)) return 0;
  return Math.max(0, Math.min(1, value));
}

function renderLevels(inputLevel, active) {
  const normalizedLevel = active ? clampLevel(inputLevel) : 0;
  levels.forEach((element, index) => {
    const weightedLevel = normalizedLevel * BAR_WEIGHTS[index];
    const height = MIN_BAR_HEIGHT + ((MAX_BAR_HEIGHT - MIN_BAR_HEIGHT) * weightedLevel);
    element.style.height = `${Math.round(height)}px`;
    element.className = active ? 'lv active' : 'lv';
  });
}

function applyVoiceState(state) {
  const status = state && typeof state.status === 'string' ? state.status : 'idle';
  const displayText = state && typeof state.displayText === 'string' ? state.displayText : '';
  const errorMessage = state && typeof state.errorMessage === 'string' ? state.errorMessage : '';
  const stateLevel = state && typeof state.inputLevel === 'number' ? state.inputLevel : 0;

  if (status === 'recording') {
    dot.className = 'active';
    text.textContent = '正在监听...';
    renderLevels(stateLevel, status === 'recording');
    return;
  }

  dot.className = '';
  renderLevels(stateLevel, false);

  if (displayText) {
    text.textContent = displayText;
    return;
  }

  if (status === 'connecting') text.textContent = '正在连接...';
  else if (status === 'stopping') text.textContent = '正在停止...';
  else if (status === 'transcribing') text.textContent = '正在转写...';
  else if (status === 'cancelled') text.textContent = '当前转录已取消';
  else if (status === 'completed') text.textContent = '已完成';
  else if (status === 'error') text.textContent = errorMessage || '发生错误';
  else text.textContent = 'Right Alt 录音';
}

if (window.ipcRenderer) {
  window.ipcRenderer.on('voice-state', (_event, state) => applyVoiceState(state));
}
</script>
</body>
</html>
